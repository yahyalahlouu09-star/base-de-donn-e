<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Articles</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="admin-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">Minimal<span>Blog</span></div>
    <ul class="sidebar-nav">
      <li><a href="dashboard.html"><span class="icon">📊</span> Tableau de bord</a></li>
      <li><a href="articles.html" class="active"><span class="icon">📝</span> Articles</a></li>
      <li><a href="commentaires.html"><span class="icon">💬</span> Commentaires</a></li>
      <li><a href="../index.html" target="_blank"><span class="icon">🌐</span> Voir le blog</a></li>
      <li><a href="#" onclick="seDeconnecter()"><span class="icon">🚪</span> Déconnexion</a></li>
    </ul>
  </aside>

  <div class="admin-main">
    <div class="admin-topbar">
      <h2>Gestion des Articles</h2>
      <button class="btn btn-accent" onclick="ouvrirModalAjout()">+ Nouvel article</button>
    </div>

    <div class="admin-content">
      <!-- Filtres -->
      <div style="display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap">
        <select id="filtreStatut" onchange="chargerArticles()"
          style="padding:.55rem 1rem;border:1px solid var(--beige-200);border-radius:3px;font-family:'Lato',sans-serif;font-size:.82rem;background:var(--white);color:var(--ink);cursor:pointer">
          <option value="">Tous les statuts</option>
          <option value="publie">Publiés</option>
          <option value="brouillon">Brouillons</option>
        </select>
        <select id="filtreCategorie" onchange="chargerArticles()"
          style="padding:.55rem 1rem;border:1px solid var(--beige-200);border-radius:3px;font-family:'Lato',sans-serif;font-size:.82rem;background:var(--white);color:var(--ink);cursor:pointer">
          <option value="">Toutes les catégories</option>
        </select>
        <input type="text" id="filtreSearch" placeholder="Rechercher…" oninput="chargerArticles()"
          style="padding:.55rem 1rem;border:1px solid var(--beige-200);border-radius:3px;font-family:'Lato',sans-serif;font-size:.82rem;flex:1;min-width:200px;background:var(--white);color:var(--ink);outline:none">
      </div>

      <table class="data-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Titre</th>
            <th>Catégorie</th>
            <th>Auteur</th>
            <th>Date</th>
            <th>Statut</th>
            <th>Commentaires</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="articlesTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- MODAL AJOUT / MODIFICATION -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitre">Nouvel article</h3>
      <button class="btn-close" onclick="fermerModal()">✕</button>
    </div>

    <input type="hidden" id="articleId">

    <div class="form-row">
      <div class="form-group">
        <label>Catégorie *</label>
        <select id="formCategorie"></select>
      </div>
      <div class="form-group">
        <label>Statut</label>
        <select id="formStatut">
          <option value="brouillon">Brouillon</option>
          <option value="publie">Publié</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Titre *</label>
      <input type="text" id="formTitre" placeholder="Titre de l'article" maxlength="255">
    </div>

    <div class="form-group">
      <label>Auteur *</label>
      <input type="text" id="formAuteur" placeholder="Nom de l'auteur" maxlength="100">
    </div>

    <div class="form-group">
      <label>Image (URL ou chemin)</label>
      <input type="text" id="formImage" placeholder="https://exemple.com/image.jpg">
    </div>

    <div class="form-group">
      <label>Contenu *</label>
      <textarea id="formContenu" rows="8" placeholder="Contenu de l'article... (séparez les paragraphes avec une ligne vide)"></textarea>
    </div>

    <div style="display:flex;gap:1rem;justify-content:flex-end;margin-top:1rem">
      <button class="btn btn-secondary" onclick="fermerModal()">Annuler</button>
      <button class="btn btn-accent" onclick="sauvegarderArticle()">💾 Sauvegarder</button>
    </div>
  </div>
</div>

<script src="../js/db.js"></script>
<script>
  DB.init();
  if (!DB.isLoggedIn()) window.location.href = 'login.html';

  function seDeconnecter() { DB.logout(); window.location.href = 'login.html'; }

  // ---- Remplir les selects catégories ----
  function remplirCategoriesSelect() {
    const cats = DB.getCategories();
    const selFil = document.getElementById('filtreCategorie');
    const selForm = document.getElementById('formCategorie');

    cats.forEach(c => {
      selFil.innerHTML += `<option value="${c.id}">${escapeHtml(c.nom)}</option>`;
      selForm.innerHTML += `<option value="${c.id}">${escapeHtml(c.nom)}</option>`;
    });
  }
  remplirCategoriesSelect();

  // ---- Charger les articles ----
  function chargerArticles() {
    const statut = document.getElementById('filtreStatut').value || null;
    const catId = document.getElementById('filtreCategorie').value || null;
    const search = document.getElementById('filtreSearch').value.trim() || null;

    const articles = DB.getArticles(statut, catId, search);
    const tbody = document.getElementById('articlesTableBody');

    if (articles.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty-state">Aucun article trouvé.</td></tr>';
      return;
    }

    tbody.innerHTML = articles.map(a => {
      const cat = DB.getCategorieById(a.categorie_id);
      const nbComs = DB.getCommentaires(a.id).length;
      return `
        <tr>
          <td><strong>${a.id}</strong></td>
          <td style="max-width:220px">
            <div style="font-weight:600;font-size:0.9rem">${escapeHtml(a.titre.substring(0, 50))}${a.titre.length > 50 ? '...' : ''}</div>
          </td>
          <td><span class="badge">${cat ? escapeHtml(cat.nom) : '—'}</span></td>
          <td>${escapeHtml(a.auteur)}</td>
          <td>${formatDateShort(a.date_publication)}</td>
          <td><span class="status-badge status-${a.statut}">${a.statut === 'publie' ? 'Publié' : 'Brouillon'}</span></td>
          <td style="text-align:center">${nbComs}</td>
          <td>
            <div class="actions">
              <a href="../article.html?id=${a.id}" target="_blank" class="btn btn-secondary btn-sm" title="Voir">👁</a>
              <button class="btn btn-primary btn-sm" onclick="ouvrirModalEdit(${a.id})" title="Modifier">✏️</button>
              <button class="btn btn-danger btn-sm" onclick="supprimerArticle(${a.id})" title="Supprimer">🗑</button>
            </div>
          </td>
        </tr>
      `;
    }).join('');
  }
  chargerArticles();

  // ---- MODAL ----
  function ouvrirModalAjout() {
    document.getElementById('modalTitre').textContent = 'Nouvel article';
    document.getElementById('articleId').value = '';
    document.getElementById('formTitre').value = '';
    document.getElementById('formAuteur').value = 'Marie Laurent';
    document.getElementById('formContenu').value = '';
    document.getElementById('formImage').value = '';
    document.getElementById('formStatut').value = 'brouillon';
    document.getElementById('formCategorie').selectedIndex = 0;
    document.getElementById('modalOverlay').classList.add('open');
  }

  function ouvrirModalEdit(id) {
    const a = DB.getArticleById(id);
    if (!a) return;
    document.getElementById('modalTitre').textContent = 'Modifier l\'article';
    document.getElementById('articleId').value = a.id;
    document.getElementById('formTitre').value = a.titre;
    document.getElementById('formAuteur').value = a.auteur;
    document.getElementById('formContenu').value = a.contenu;
    document.getElementById('formImage').value = a.image_principale || '';
    document.getElementById('formStatut').value = a.statut;
    document.getElementById('formCategorie').value = a.categorie_id;
    document.getElementById('modalOverlay').classList.add('open');
  }

  function fermerModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  // Fermer en cliquant en dehors
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) fermerModal();
  });

  function sauvegarderArticle() {
    const id = document.getElementById('articleId').value;
    const titre = document.getElementById('formTitre').value.trim();
    const auteur = document.getElementById('formAuteur').value.trim();
    const contenu = document.getElementById('formContenu').value.trim();
    const categorie_id = parseInt(document.getElementById('formCategorie').value);
    const statut = document.getElementById('formStatut').value;
    const image_principale = document.getElementById('formImage').value.trim();

    if (!titre) { alert('Le titre est obligatoire.'); return; }
    if (!auteur) { alert('L\'auteur est obligatoire.'); return; }
    if (!contenu) { alert('Le contenu est obligatoire.'); return; }

    const data = { titre, auteur, contenu, categorie_id, statut, image_principale };

    if (id) {
      DB.updateArticle(parseInt(id), data);
      showNotification('Article modifié avec succès !');
    } else {
      DB.addArticle(data);
      showNotification('Article créé avec succès !');
    }

    fermerModal();
    chargerArticles();
  }

  function supprimerArticle(id) {
    const a = DB.getArticleById(id);
    if (!confirm(`Supprimer l'article "${a.titre}" ?\nSes commentaires seront aussi supprimés.`)) return;
    DB.deleteArticle(id);
    showNotification('Article supprimé.', 'error');
    chargerArticles();
  }
</script>
</body>
</html>
