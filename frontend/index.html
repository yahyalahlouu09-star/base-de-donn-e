<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MinimalBlog — Accueil</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- HEADER -->
<header>
  <a href="index.html" class="logo">Minimal<span>Blog</span></a>
  <nav>
    <a href="index.html">Accueil</a>
    <a href="index.html">Articles</a>
    <a href="admin/login.html" class="btn-admin">Admin</a>
  </nav>
</header>

<!-- HERO -->
<div class="hero">
  <h1>Le Blog de Marie Laurent</h1>
  <p>Articles sur la technologie, les voyages, la culture et bien plus encore.</p>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Rechercher un article...">
    <button onclick="rechercherArticles()">🔍</button>
  </div>
</div>

<!-- CONTENU -->
<div class="container">
  <div class="categories-filter" id="categoriesFilter">
    <button class="cat-btn active" onclick="filtrerCategorie(null, this)">Tous</button>
  </div>

  <div id="articlesGrid" class="articles-grid">
    <div class="empty-state" style="grid-column:1/-1">⏳ Chargement des articles…</div>
  </div>

  <div class="pagination" id="pagination"></div>
</div>

<!-- FOOTER -->
<footer>
  <p>&copy; 2025 <strong>MinimalBlog</strong> — Projet BD ESISA</p>
</footer>

<script>const API_BASE = '../backend/api';</script>
<script src="assets/js/utils.js"></script>
<script>
  let pageActuelle   = 1;
  const PAR_PAGE     = 6;
  let categorieActive = null;
  let rechercheActive = '';

  // ---- Init ----
  (async () => {
    await chargerCategories();
    await afficherArticles();
    initTilt();
  })();

  // ---- Catégories ----
  async function chargerCategories() {
    try {
      const cats = await API.get('categories.php');
      const filter = document.getElementById('categoriesFilter');
      cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'cat-btn';
        btn.textContent = cat.nom;
        btn.onclick = function() { filtrerCategorie(cat.id, this); };
        filter.appendChild(btn);
      });
    } catch (e) { console.warn('Catégories :', e.message); }
  }

  function filtrerCategorie(id, btn) {
    categorieActive = id;
    pageActuelle    = 1;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    afficherArticles();
  }

  // ---- Recherche ----
  function rechercherArticles() {
    rechercheActive = document.getElementById('searchInput').value.trim();
    pageActuelle    = 1;
    afficherArticles();
  }

  document.getElementById('searchInput').addEventListener('keyup', function(e) {
    if (e.key === 'Enter') rechercherArticles();
    if (!this.value)       { rechercheActive = ''; afficherArticles(); }
  });

  // ---- Afficher articles ----
  async function afficherArticles() {
    const grid = document.getElementById('articlesGrid');
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">⏳ Chargement…</div>';

    try {
      const params = { statut: 'publie', page: pageActuelle, per_page: PAR_PAGE };
      if (categorieActive) params.categorie_id = categorieActive;
      if (rechercheActive) params.search        = rechercheActive;

      const { articles, total_pages } = await API.get('articles.php', params);

      if (!articles.length) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">😕 Aucun article trouvé.</div>';
        document.getElementById('pagination').innerHTML = '';
        return;
      }

      grid.innerHTML = articles.map(art => {
        const extrait = art.contenu.replace(/\n/g, ' ').substring(0, 150) + '…';
        const nb = art.nb_commentaires;
        return `
          <div class="card" onclick="location.href='article.html?id=${art.id}'">
            <div class="card-img">
              ${art.image_principale
                ? `<img src="${escHtml(art.image_principale)}" alt="${escHtml(art.titre)}"
                       onerror="this.parentElement.innerHTML='<span style=font-size:3.5rem>${art.emoji || '📝'}</span>'">`
                : `<span style="font-size:3.5rem">${art.emoji || '📝'}</span>`}
            </div>
            <div class="card-body">
              <div class="card-meta">
                <span class="badge">${escHtml(art.categorie_nom || 'Divers')}</span>
                <span class="card-date">📅 ${formatDate(art.date_publication)}</span>
              </div>
              <h2>${escHtml(art.titre)}</h2>
              <p>${escHtml(extrait)}</p>
            </div>
            <div class="card-footer">
              <span>✍️ ${escHtml(art.auteur)}</span>
              <span>💬 ${nb} commentaire${nb !== 1 ? 's' : ''}</span>
              <span class="read-more">Lire →</span>
            </div>
          </div>`;
      }).join('');

      afficherPagination(total_pages);
      initTilt();
    } catch (e) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        ❌ Impossible de charger les articles.<br>
        <small style="color:#f87171">${escHtml(e.message)}</small><br><br>
        <small>Vérifiez que le serveur PHP est lancé et la base configurée.</small>
      </div>`;
    }
  }

  // ---- Pagination ----
  function afficherPagination(total) {
    const div = document.getElementById('pagination');
    if (total <= 1) { div.innerHTML = ''; return; }
    div.innerHTML = Array.from({ length: total }, (_, i) => i + 1)
      .map(i => `<button class="page-btn${i === pageActuelle ? ' active' : ''}"
                   onclick="changerPage(${i})">${i}</button>`)
      .join('');
  }

  function changerPage(n) {
    pageActuelle = n;
    afficherArticles();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  // ---- Effet tilt 3D ----
  function initTilt() {
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('mousemove', function(e) {
        const r  = this.getBoundingClientRect();
        const dx = (e.clientX - r.left - r.width  / 2) / (r.width  / 2);
        const dy = (e.clientY - r.top  - r.height / 2) / (r.height / 2);
        this.style.transform = `translateY(-10px) rotateX(${dy * 6}deg) rotateY(${-dx * 6}deg)`;
        this.classList.add('tilt-active');
      });
      card.addEventListener('mouseleave', function() {
        this.style.transform = '';
        this.classList.remove('tilt-active');
      });
    });
  }
</script>
</body>
</html>
