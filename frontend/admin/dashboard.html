<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Tableau de bord</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<div class="admin-layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">Minimal<span>Blog</span></div>
    <ul class="sidebar-nav">
      <li><a href="dashboard.html"    class="active"><span class="icon">📊</span> Tableau de bord</a></li>
      <li><a href="articles.html">    <span class="icon">📝</span> Articles</a></li>
      <li><a href="commentaires.html"><span class="icon">💬</span> Commentaires</a></li>
      <li><a href="../index.html" target="_blank"><span class="icon">🌐</span> Voir le blog</a></li>
      <li style="margin-top:2rem">
        <a href="#" onclick="seDeconnecter()"><span class="icon">🚪</span> Déconnexion</a>
      </li>
    </ul>
  </aside>

  <!-- MAIN -->
  <div class="admin-main">
    <div class="admin-topbar">
      <h2>Tableau de bord</h2>
      <span id="adminLogin" style="color:var(--gris);font-size:.9rem"></span>
    </div>

    <div class="admin-content">

      <!-- Stats -->
      <div class="stats-grid" id="statsGrid">
        <!-- Injecté dynamiquement -->
      </div>

      <!-- Grille articles récents + commentaires en attente -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:2rem;margin-top:1rem">

        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
            <h3 style="font-family:'Playfair Display',serif;background:linear-gradient(135deg,var(--blanc),#c4b5fd);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent">
              Articles récents
            </h3>
            <a href="articles.html" style="color:#a78bfa;font-size:.85rem">Voir tout →</a>
          </div>
          <div id="recentArticles"></div>
        </div>

        <div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
            <h3 style="font-family:'Playfair Display',serif;background:linear-gradient(135deg,var(--blanc),#c4b5fd);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent">
              Commentaires en attente
            </h3>
            <a href="commentaires.html" style="color:#a78bfa;font-size:.85rem">Modérer →</a>
          </div>
          <div id="pendingComments"></div>
        </div>

      </div>
    </div>
  </div>
</div>

<script>const API_BASE = '../../backend/api';</script>
<script src="../assets/js/utils.js"></script>
<script>
  // ---- Vérif session ----
  (async () => {
    try {
      const auth = await API.get('auth.php');
      document.getElementById('adminLogin').textContent = `Connecté : ${auth.login}`;
    } catch {
      location.href = 'login.html';
    }
    await chargerDashboard();
  })();

  async function seDeconnecter() {
    try { await API.delete('auth.php'); } catch {}
    location.href = 'login.html';
  }

  async function chargerDashboard() {
    await Promise.all([chargerStats(), chargerArticlesRecents(), chargerCommentairesEnAttente()]);
  }

  // ---- Stats ----
  async function chargerStats() {
    try {
      const s = await API.get('stats.php');
      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
          <div class="stat-number">${s.articles_total}</div>
          <div class="stat-label">Total articles</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${s.articles_publies}</div>
          <div class="stat-label">Publiés</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${s.articles_brouillon}</div>
          <div class="stat-label">Brouillons</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${s.commentaires_total}</div>
          <div class="stat-label">Commentaires</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" style="color:#fbbf24">${s.commentaires_pending}</div>
          <div class="stat-label">En attente</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${s.categories_total}</div>
          <div class="stat-label">Catégories</div>
        </div>`;
    } catch (e) {
      document.getElementById('statsGrid').innerHTML =
        `<p class="empty-state">❌ ${escHtml(e.message)}</p>`;
    }
  }

  // ---- Articles récents ----
  async function chargerArticlesRecents() {
    const el = document.getElementById('recentArticles');
    try {
      const { articles } = await API.get('articles.php', { per_page: 5 });
      if (!articles.length) { el.innerHTML = '<p class="empty-state">Aucun article.</p>'; return; }
      el.innerHTML = articles.map(a => `
        <div style="background:var(--glass-bg);border:1px solid var(--glass-bd);padding:.9rem 1.1rem;border-radius:10px;margin-bottom:.6rem;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(10px)">
          <div>
            <div style="font-size:.88rem;font-weight:600;color:var(--blanc)">${escHtml(a.titre.substring(0,48))}${a.titre.length > 48 ? '…' : ''}</div>
            <div style="font-size:.75rem;color:var(--gris)">${formatDateShort(a.date_publication)}</div>
          </div>
          <span class="status-badge status-${a.statut}">${a.statut === 'publie' ? 'Publié' : 'Brouillon'}</span>
        </div>`).join('');
    } catch (e) { el.innerHTML = `<p class="empty-state">❌ ${escHtml(e.message)}</p>`; }
  }

  // ---- Commentaires en attente ----
  async function chargerCommentairesEnAttente() {
    const el = document.getElementById('pendingComments');
    try {
      const coms = await API.get('commentaires.php', { admin: 1 });
      const pending = coms.filter(c => !c.approuve).slice(0, 5);
      if (!pending.length) {
        el.innerHTML = '<div class="empty-state" style="padding:1.5rem">🎉 Aucun commentaire en attente.</div>';
        return;
      }
      el.innerHTML = pending.map(c => `
        <div style="background:var(--glass-bg);border:1px solid var(--glass-bd);border-radius:10px;padding:.9rem 1.1rem;margin-bottom:.6rem;backdrop-filter:blur(10px)">
          <div style="display:flex;justify-content:space-between;margin-bottom:.3rem">
            <span style="font-weight:600;font-size:.86rem;color:#a78bfa">👤 ${escHtml(c.pseudo)}</span>
            <span style="font-size:.73rem;color:var(--gris)">${formatDateShort(c.date_commentaire)}</span>
          </div>
          <div style="font-size:.83rem;color:rgba(220,220,255,.7);margin-bottom:.5rem">
            ${escHtml(c.contenu.substring(0, 90))}${c.contenu.length > 90 ? '…' : ''}
          </div>
          <div style="display:flex;gap:.5rem">
            <button class="btn btn-success btn-sm" onclick="approuver(${c.id}, this)">✓ Approuver</button>
            <button class="btn btn-danger btn-sm"  onclick="supprimer(${c.id}, this)">✗ Supprimer</button>
          </div>
        </div>`).join('');
    } catch (e) { el.innerHTML = `<p class="empty-state">❌ ${escHtml(e.message)}</p>`; }
  }

  async function approuver(id, btn) {
    btn.disabled = true;
    try {
      await API.put(`commentaires.php?id=${id}`, { approuve: true });
      showNotification('✅ Commentaire approuvé !');
      chargerDashboard();
    } catch (e) { showNotification(e.message, 'error'); btn.disabled = false; }
  }

  async function supprimer(id, btn) {
    if (!confirm('Supprimer définitivement ce commentaire ?')) return;
    btn.disabled = true;
    try {
      await API.delete(`commentaires.php?id=${id}`);
      showNotification('🗑 Commentaire supprimé.', 'error');
      chargerDashboard();
    } catch (e) { showNotification(e.message, 'error'); btn.disabled = false; }
  }
</script>
</body>
</html>
