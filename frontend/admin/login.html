<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MinimalBlog — Connexion Admin</title>
  <link rel="stylesheet" href="../../css/style.css">
</head>
<body>

<div class="login-page">
  <div class="login-box">
    <h2>MinimalBlog</h2>
    <p>Espace d'administration — Connexion requise</p>

    <div id="errorMsg"   class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>

    <div class="form-group">
      <label>Login</label>
      <input type="text" id="login" placeholder="admin" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn btn-accent" id="loginBtn" style="width:100%;margin-top:.5rem"
            onclick="seConnecter()">
      Se connecter →
    </button>

    <p style="margin-top:1.5rem;font-size:.82rem;color:var(--gris);text-align:center">
      <a href="../index.html" style="color:#a78bfa">← Retour au blog</a>
    </p>

    <div style="margin-top:1.5rem;padding:1rem;background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2);border-radius:10px;font-size:.8rem;color:var(--gris)">
      <strong style="color:#c4b5fd">Démo :</strong>
      login = <code style="color:#67e8f9">admin</code> /
      mot de passe = <code style="color:#67e8f9">admin123</code>
    </div>
  </div>
</div>

<script>const API_BASE = '../../backend/api';</script>
<script src="../assets/js/utils.js"></script>
<script>
  // Rediriger si déjà connecté
  (async () => {
    try {
      await API.get('auth.php');
      location.href = 'dashboard.html';
    } catch { /* non connecté, rester sur la page */ }
  })();

  document.getElementById('password').addEventListener('keyup', e => {
    if (e.key === 'Enter') seConnecter();
  });

  async function seConnecter() {
    const login    = document.getElementById('login').value.trim();
    const password = document.getElementById('password').value;
    const errEl    = document.getElementById('errorMsg');
    const btn      = document.getElementById('loginBtn');

    errEl.style.display = 'none';

    // Validation front
    if (!login)    { showErr('Veuillez saisir votre login.');           return; }
    if (!password) { showErr('Veuillez saisir votre mot de passe.');    return; }

    btn.disabled    = true;
    btn.textContent = '⏳ Connexion…';

    try {
      await API.post('auth.php', { login, password });
      document.getElementById('successMsg').textContent = '✅ Connexion réussie, redirection…';
      document.getElementById('successMsg').style.display = 'block';
      setTimeout(() => location.href = 'dashboard.html', 600);
    } catch (e) {
      showErr(`❌ ${e.message}`);
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Se connecter →';
    }
  }

  function showErr(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent    = msg;
    el.style.display  = 'block';
  }
</script>
</body>
</html>
